name: Deploy frontend to GitHub Pages

# 프론트엔드(UI)만 정적 호스팅합니다. 실제 AI 분석은 백엔드가 필요해
# Pages 에서는 동작하지 않고, 화면 미리보기 용도입니다.

on:
  push:
    branches: [claude/pokemon-face-matcher-e5fj9q]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # 저장소에 Pages 가 꺼져 있으면 자동으로 켭니다 (GitHub Actions 소스).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          # 정적 프론트엔드 파일만 올립니다.
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
