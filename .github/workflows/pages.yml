name: Deploy frontend to GitHub Pages

# 프론트엔드(UI)만 정적 호스팅합니다. 실제 AI 분석은 백엔드가 필요해
# Pages 에서는 동작하지 않고, 화면 미리보기 용도입니다.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pages 활성화는 저장소 Settings → Pages → Source: GitHub Actions 에서
      # 최초 1회 직접 켜주세요 (Actions 토큰으로는 활성화 권한이 없음).
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          # 정적 프론트엔드 파일만 올립니다.
          path: "."
      - id: deployment
        uses: actions/deploy-pages@v4
