<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>닮은 포켓몬 찾기 🔍</title>
    <meta name="description" content="사진을 찍거나 올리면 얼굴과 닮은 포켓몬을 찾아드려요!" />
    <link rel="stylesheet" href="css/style.css?v=3" />
    <link rel="preconnect" href="https://pokeapi.co" />
    <link rel="preconnect" href="https://raw.githubusercontent.com" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <h1>🔍 닮은 포켓몬 찾기</h1>
        <p>사진을 찍거나 올리면 당신과 닮은 포켓몬을 찾아드려요!</p>
      </header>

      <section class="controls">
        <button id="cameraBtn" class="btn primary">📸 사진 찍기</button>
        <button id="uploadBtn" class="btn">🖼️ 사진 올리기</button>
        <input id="fileInput" type="file" accept="image/*" hidden />
      </section>

      <p id="status" class="status" style="display: none"></p>

      <section id="cameraArea" class="camera-area" style="display: none">
        <video id="video" autoplay playsinline muted></video>
        <button id="captureBtn" class="btn primary">찰칵! 분석하기</button>
      </section>

      <section class="stage">
        <img id="preview" class="preview" style="display: none" alt="입력 사진" />
        <div id="result" class="result"></div>
        <button id="retryBtn" class="btn" style="display: none">🔄 다시 하기</button>
      </section>

      <canvas id="canvas" hidden></canvas>

      <footer class="footer">
        <p>
          사진은 분석을 위해 서버를 거쳐 AI에 전달되며, 저장하지 않습니다.
          분석에는 Claude 비전 모델을 사용합니다. 🤖
        </p>
        <p class="small">재미로 즐기는 앱이에요 · 포켓몬 이미지 © Nintendo / Game Freak</p>
      </footer>
    </main>

    <script type="module" src="js/app.js?v=3"></script>
  </body>
</html>
